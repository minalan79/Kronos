apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: kronos

namespace: kronos

resources:
  - namespace.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml

commonLabels:
  project: kronos
  managed-by: terraform

images:
  - name: REGISTRY/kronos
    newTag: latest
