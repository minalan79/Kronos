apiVersion: v1
kind: ServiceAccount
metadata:
  name: kronos-app
  namespace: kronos
---
apiVersion: v1
kind: Service
metadata:
  name: kronos-app
  namespace: kronos
  labels:
    app: kronos-app
spec:
  type: LoadBalancer
  selector:
    app: kronos-app
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None
